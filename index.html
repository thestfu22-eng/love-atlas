<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Atlas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: sans-serif;
}

#map {
  height: 100%;
  width: 100%;
}

.popup-content {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input, textarea, button {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.closeBtn {
  background: #444;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

map.on('click', function(e) {

  var popupContent = document.createElement("div");
  popupContent.className = "popup-content";

  var coords = document.createElement("div");
  coords.innerText =
    "Lat: " + e.latlng.lat.toFixed(3) +
    " | Lng: " + e.latlng.lng.toFixed(3);

  var dateInput = document.createElement("input");
  dateInput.type = "date";

  var noteInput = document.createElement("textarea");
  noteInput.placeholder = "Not yaz";

  var saveBtn = document.createElement("button");
  saveBtn.innerText = "Kaydet";

  saveBtn.onclick = function() {
    if(!dateInput.value || !noteInput.value){
      alert("Tarih ve not gir");
      return;
    }

    L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

    map.closePopup();
  };

  var closeBtn = document.createElement("button");
  closeBtn.innerText = "Kapat";
  closeBtn.className = "closeBtn";
  closeBtn.onclick = function(){
    map.closePopup();
  };

  popupContent.appendChild(coords);
  popupContent.appendChild(dateInput);
  popupContent.appendChild(noteInput);
  popupContent.appendChild(saveBtn);
  popupContent.appendChild(closeBtn);

  L.popup()
    .setLatLng(e.latlng)
    .setContent(popupContent)
    .openOn(map);

});

</script>

</body>
</html>
