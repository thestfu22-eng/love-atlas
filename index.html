<script src="https://unpkg.com/globe.gl"></script>
<script src="https://unpkg.com/three"></script>

<script>

const PASSWORD="1234";

function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
}else{
alert("Yanlış şifre");
}
}

const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
  globe.pointOfView({ lat: 20, lng: 0, altitude: 2 });
  .showAtmosphere(true)
  .atmosphereColor('#ff0055')
  .atmosphereAltitude(0.25);

globe.controls().enableZoom = true;
globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.3;
globe.controls().minDistance = 150;
globe.controls().maxDistance = 400;

let data = JSON.parse(localStorage.getItem("memories")) || [];
globe.pointsData(data);

// Şehir etiketleri (zoom yapınca görünecek)
fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/worldcities.csv')
.then(res => res.text())
.then(csv => {
  const cities = csv.split("\n").slice(1,300).map(row => {
    const cols = row.split(",");
    return {
      lat: +cols[2],
      lng: +cols[3],
      label: cols[0]
    };
  });

  globe.labelsData(cities)
    .labelLat(d => d.lat)
    .labelLng(d => d.lng)
    .labelText(d => d.label)
    .labelSize(d => 0.5)
    .labelColor(() => 'white')
    .labelDotRadius(0.1)
    .labelAltitude(0.01);
});

globe.onGlobeClick((coords)=>{
window.current=coords;
document.getElementById("coords").innerText=
"Lat: "+coords.lat.toFixed(3)+" | Lng: "+coords.lng.toFixed(3);
document.getElementById("popup").style.display="block";
});

function save(){
if(!document.getElementById("date").value || !document.getElementById("note").value){
alert("Tarih ve not gir");
return;
}

let memory={
lat:window.current.lat,
lng:window.current.lng,
size:0.6,
color:"red",
date:document.getElementById("date").value,
note:document.getElementById("note").value
};

data.push(memory);
localStorage.setItem("memories",JSON.stringify(data));
globe.pointsData(data);
document.getElementById("popup").style.display="none";
}

</script>
