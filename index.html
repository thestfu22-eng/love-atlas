<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Atlas</title>
<script src="https://unpkg.com/globe.gl"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#globeViz {
  width: 100vw;
  height: 100vh;
}

.popup {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 60%;
  background: rgba(0,0,0,0.95);
  color: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  display: none;
  overflow-y: auto;
  z-index: 10;
}

input, textarea, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.closeBtn {
  background: #444;
}
</style>
</head>

<body>

<div id="globeViz"></div>

<div class="popup" id="popup">
  <div id="locationName"></div>
  <input type="date" id="date">
  <textarea id="note" placeholder="Not yaz"></textarea>
  <button onclick="saveMemory()">Kaydet</button>
  <button class="closeBtn" onclick="closePopup()">Kapat</button>
</div>

<script>

const globe = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png');

globe.controls().autoRotate = false;
globe.controls().enablePan = false;

let memories = [];

globe.onGlobeClick((coords) => {

  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${coords.lat}&lon=${coords.lng}`)
  .then(res => res.json())
  .then(data => {

    let city =
      data.address.city ||
      data.address.town ||
      data.address.village ||
      data.address.state ||
      "Bilinmeyen Konum";

    document.getElementById("locationName").innerText =
      city + " (" +
      coords.lat.toFixed(2) + ", " +
      coords.lng.toFixed(2) + ")";

    document.getElementById("popup").style.display = "block";
    window.currentCoords = coords;
  });

});

function saveMemory() {

  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  if(!date || !note){
    alert("Tarih ve not gir");
    return;
  }

  memories.push({
    lat: window.currentCoords.lat,
    lng: window.currentCoords.lng,
    size: 0.6,
    color: "red"
  });

  globe.pointsData(memories);

  closePopup();
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
