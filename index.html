<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Atlas</title>
<script src="https://unpkg.com/globe.gl"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

#container {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#globeViz {
  width: 100%;
  height: 100%;
}

.popup {
  position: absolute;
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 15px;
  border-radius: 12px;
  display: none;
  width: 250px;
  z-index: 10;
  box-shadow: 0 0 20px rgba(255,0,80,0.6);
}

.popup input,
.popup textarea,
.popup button {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  border-radius: 6px;
  border: none;
}

.popup button {
  background: #ff0055;
  color: white;
}

.closeBtn {
  background: #444 !important;
}
</style>
</head>

<body>

<div id="container">
  <div id="globeViz"></div>

  <div class="popup" id="popup">
    <div id="coords"></div>
    <input type="date" id="date">
    <textarea id="note" placeholder="Not yaz"></textarea>
    <button onclick="saveMemory()">Kaydet</button>
    <button class="closeBtn" onclick="closePopup()">Kapat</button>
  </div>
</div>

<script>

const globe = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
  .showAtmosphere(true)
  .atmosphereColor('#ff0055')
  .atmosphereAltitude(0.25);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.4;
globe.controls().enablePan = false;

let memories = [];

globe.onGlobeClick((coords, event) => {
  const popup = document.getElementById("popup");

  document.getElementById("coords").innerText =
    "Lat: " + coords.lat.toFixed(3) +
    " | Lng: " + coords.lng.toFixed(3);

  popup.style.left = event.clientX + "px";
  popup.style.top = event.clientY + "px";
  popup.style.display = "block";

  window.currentCoords = coords;
});

function saveMemory() {
  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  if(!date || !note) {
    alert("Tarih ve not gir");
    return;
  }

  const memory = {
    lat: window.currentCoords.lat,
    lng: window.currentCoords.lng,
    size: 0.6,
    color: "red"
  };

  memories.push(memory);
  globe.pointsData(memories);

  closePopup();
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
