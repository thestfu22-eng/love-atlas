<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Atlas</title>
<script src="https://unpkg.com/globe.gl"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

#globeViz {
  width: 100vw;
  height: 100vh;
}

.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.95);
  color: white;
  padding: 20px;
  border-radius: 14px;
  width: 280px;
  display: none;
  z-index: 10;
  box-shadow: 0 0 25px rgba(255,0,80,0.6);
}

input, textarea, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff0055;
  color: white;
}

.closeBtn {
  background: #444;
}
</style>
</head>

<body>

<div id="globeViz"></div>

<div class="popup" id="popup">
  <div id="coords"></div>
  <input type="date" id="date">
  <textarea id="note" placeholder="Not yaz"></textarea>
  <button onclick="saveMemory()">Kaydet</button>
  <button class="closeBtn" onclick="closePopup()">Kapat</button>
</div>

<script>

const globe = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png');

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.4;
globe.controls().enablePan = false;

let memories = [];

globe.onGlobeClick((coords) => {
  document.getElementById("coords").innerText =
    "Lat: " + coords.lat.toFixed(3) +
    " | Lng: " + coords.lng.toFixed(3);

  document.getElementById("popup").style.display = "block";

  window.currentCoords = coords;
});

function saveMemory() {

  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  if(!date || !note){
    alert("Tarih ve not gir");
    return;
  }

  memories.push({
    lat: window.currentCoords.lat,
    lng: window.currentCoords.lng,
    size: 0.6,
    color: "red"
  });

  globe.pointsData(memories);

  closePopup();
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
